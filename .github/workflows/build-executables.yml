name: Build Standalone Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Linux/Mac)
        if: matrix.os != 'windows-latest'
        run: |
          pyinstaller --name professor-osint \
                      --onefile \
                      --add-data "news_feeds.json:." \
                      --add-data "social_sites.json:." \
                      --add-data "config.json.example:." \
                      professor_osint.py

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --name professor-osint \
                      --onefile \
                      --add-data "news_feeds.json;." \
                      --add-data "social_sites.json;." \
                      --add-data "config.json.example;." \
                      professor_osint.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: professor-osint-${{ matrix.os }}
          path: |
            dist/professor-osint
            dist/professor-osint.exe

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/professor-osint
            dist/professor-osint.exe

name: Build Standalone Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install UPX (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Install UPX (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install upx

      - name: Install UPX (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install upx -y

      - name: Build with PyInstaller (Linux/Mac)
        if: matrix.os != 'windows-latest'
        run: |
          pyinstaller --name professor-osint \
                      --onefile \
                      --strip \
                      --exclude-module tkinter \
                      --exclude-module unittest \
                      --exclude-module pydoc \
                      --exclude-module test \
                      --exclude-module lib2to3 \
                      --add-data "news_feeds.json:." \
                      --add-data "social_sites.json:." \
                      --add-data "config.json.example:." \
                      run.py

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --name professor-osint `
                      --onefile `
                      --exclude-module tkinter `
                      --exclude-module unittest `
                      --exclude-module pydoc `
                      --exclude-module test `
                      --exclude-module lib2to3 `
                      --add-data "news_feeds.json;." `
                      --add-data "social_sites.json;." `
                      --add-data "config.json.example;." `
                      run.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: professor-osint-${{ matrix.os }}
          path: |
            dist/professor-osint
            dist/professor-osint.exe

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/professor-osint
            dist/professor-osint.exe
